# Base de datos
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=ticketuser
quarkus.datasource.password=ticketpass
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/ticketdb

quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

quarkus.http.port=8080

# CORS
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://127.0.0.1:5500,http://localhost:5500
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS

quarkus.swagger-ui.always-include=true