<!--
    Archivo: index.html
    Descripción: Interfaz principal de la aplicación para crear, visualizar y gestionar tickets desde el navegador.
-->

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Tickets - Modo Humano & Agente</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar">
        <h1>🎟️ Sistema de Gestión de Tickets</h2>
        <span class="badge">Listo para WebMCP</span>
    </header>

    <main class="container">
        <section class="form-section">
            <h2>Crear Nuevo Ticket</h2>
            <form id="ticket-form">
                <div class="form-group">
                    <label for="title">Título del Problema</label>
                    <input type="text" id="title" required placeholder="Ej. Error en la VPN corporativa">
                </div>
                
                <div class="form-group">
                    <label for="description">Descripción Detallada</label>
                    <textarea id="description" rows="4" placeholder="Describe los síntomas del error..."></textarea>
                </div>
                
                <div class="form-group">
                    <label for="priority">Prioridad</label>
                    <select id="priority">
                        <option value="LOW">Baja</option>
                        <option value="MEDIUM" selected>Media</option>
                        <option value="HIGH">Alta</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary">Guardar Ticket</button>
            </form>
        </section>

        <section class="list-section">
            <div class="list-header">
                <h2>Tickets en el Sistema</h2>
                <button id="btn-refresh" class="btn btn-secondary">🔄 Actualizar</button>
            </div>
            <div id="tickets-container" class="tickets-grid">
                <p class="loading-text">Cargando tickets...</p>
            </div>
        </section>
    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
